<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" fill="#0d0d0a"/>
  <rect x="2" y="2" width="60" height="60" fill="none" stroke="#1a3a1a" stroke-width="1.5"/>
  <rect x="6" y="6" width="52" height="52" fill="none" stroke="#1a3a1a" stroke-width="0.5"/>
  <!-- Corner marks -->
  <line x1="2" y1="14" x2="8" y2="14" stroke="#4ade80" stroke-width="1"/>
  <line x1="8" y1="2" x2="8" y2="8" stroke="#4ade80" stroke-width="1"/>
  <line x1="62" y1="14" x2="56" y2="14" stroke="#4ade80" stroke-width="1"/>
  <line x1="56" y1="2" x2="56" y2="8" stroke="#4ade80" stroke-width="1"/>
  <line x1="2" y1="50" x2="8" y2="50" stroke="#4ade80" stroke-width="1"/>
  <line x1="8" y1="62" x2="8" y2="56" stroke="#4ade80" stroke-width="1"/>
  <line x1="62" y1="50" x2="56" y2="50" stroke="#4ade80" stroke-width="1"/>
  <line x1="56" y1="62" x2="56" y2="56" stroke="#4ade80" stroke-width="1"/>
  <!-- S7 text -->
  <text x="32" y="42" font-family="monospace" font-size="26" font-weight="bold" fill="#4ade80" text-anchor="middle" letter-spacing="-1">S7</text>
  <!-- Scanline effect -->
  <rect width="64" height="64" fill="url(#scan)" opacity="0.15"/>
  <defs>
    <pattern id="scan" width="64" height="4" patternUnits="userSpaceOnUse">
      <rect width="64" height="2" fill="#000"/>
    </pattern>
  </defs>
</svg>
